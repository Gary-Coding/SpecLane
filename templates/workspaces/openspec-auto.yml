version: 1
mode: auto
workflow_source: openspec
vars:
  demand_name: __DEMAND_NAME__
demand_file: demands/${demand_name}/需求.md
todo_file: demands/${demand_name}/todo.md
reference_files:
  - docs/需求分析与实现指南.md
  - docs/开发规范.md
code_path: __CODE_PATH__
output_dir: demands/${demand_name}/output
openspec:
  changes_dir: openspec/changes

# 可选：自动识别不准确时覆盖验证命令
# verify_commands:
#   default: mvn -q test
